name: Publish WannierBerri to PyPI

on:
  push:
    tags:
      - 'v[0-9]*'   # matches v1.2.0, v0.15.1, etc.
  workflow_dispatch:  # allows manual trigger

jobs:
  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wannierberri
    permissions:
      id-token: write

    steps:
    # Checkout full history including tags for setuptools-scm
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Upgrade pip and install build tools
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel build setuptools-scm[toml]

    - name: Build source and wheel distributions
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__  # use PyPI API token
        password: ${{ secrets.PYPI_API_TOKEN }}

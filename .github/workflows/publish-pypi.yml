name: Publish WannierBerri to PyPI

on:
  push:
    tags:
      - 'v[0-9]*'   # only runs on version tags
  workflow_dispatch:  # allows manual runs

jobs:
  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wannierberri
    permissions:
      id-token: write

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      # 3️⃣ Upgrade pip and install build tools
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel build setuptools-scm[toml] twine virtualenv

      # 4️⃣ Clean old builds
      - name: Clean previous builds
        run: rm -rf dist build *.egg-info

      # 5️⃣ Build distributions
      - name: Build distributions
        run: python -m build

      # 6️⃣ Upload to PyPI with verbose logging
      - name: Upload to PyPI (verbose)
        run: |
          twine upload --verbose --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # 7️⃣ List dist folder
      - name: List dist folder
        run: ls -l dist/

      # 8️⃣ Verify package installation from PyPI with retries
      - name: Verify uploaded package
        run: |
          set -e
          python -m virtualenv venv-test
          source venv-test/bin/activate
          pip install --upgrade pip

          # retry intervals in seconds: 30s, 2min, 5min
          RETRIES=(30 60 120 300)
          SUCCESS=0
          for WAIT in "${RETRIES[@]}"; do
              echo "Trying to install wannierberri==${GITHUB_REF#refs/tags/v} ..."
              if pip install wannierberri==${GITHUB_REF#refs/tags/v}; then
                  SUCCESS=1
                  break
              else
                  echo "Install failed. Waiting $WAIT seconds before retry..."
                  sleep $WAIT
              fi
          done

          if [ $SUCCESS -ne 1 ]; then
              echo "Failed to install wannierberri after multiple retries."
              exit 1
          fi

          # Run simple verification
          python -c "import wannierberri; print('WannierBerri version:', wannierberri.__version__); wannierberri.welcome()"